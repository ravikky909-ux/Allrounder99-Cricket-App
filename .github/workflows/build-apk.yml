name: Build Allrounder99 Cricket v3 APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Extract project ZIP
        shell: bash
        run: |
          set -euo pipefail

          ZIP_FILE="$GITHUB_WORKSPACE/0-v3.1-API-Fix.zip"

          if [ ! -f "$ZIP_FILE" ]; then
            echo "ERROR: Repository root me 0-v3.1-API-Fix.zip nahi mila."
            echo "Repository me available files:"
            find "$GITHUB_WORKSPACE" -maxdepth 2 -type f
            exit 1
          fi

          rm -rf "$GITHUB_WORKSPACE/extracted"
          mkdir -p "$GITHUB_WORKSPACE/extracted"

          unzip -q "$ZIP_FILE" \
            -d "$GITHUB_WORKSPACE/extracted"

          SETTINGS_FILE=$(find "$GITHUB_WORKSPACE/extracted" \
            -type f \
            \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
            | head -n 1 || true)

          if [ -z "$SETTINGS_FILE" ]; then
            echo "ERROR: ZIP ke andar settings.gradle ya settings.gradle.kts nahi mila."
            echo "ZIP ke extracted files:"
            find "$GITHUB_WORKSPACE/extracted" -maxdepth 4 -type f
            exit 1
          fi

          PROJECT_DIR=$(dirname "$SETTINGS_FILE")

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project directory found: $PROJECT_DIR"

      - name: Validate Cricket API secret
        shell: bash
        env:
          CRICKET_API_KEY: ${{ secrets.CRICKET_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${CRICKET_API_KEY:-}" ]; then
            echo "ERROR: GitHub repository secret CRICKET_API_KEY add nahi hua."
            exit 1
          fi

          echo "Cricket API secret available."

      - name: Build installable APK
        shell: bash
        env:
          CRICKET_API_KEY: ${{ secrets.CRICKET_API_KEY }}
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew :app:assembleDebug \
              --no-daemon \
              --stacktrace
          else
            gradle :app:assembleDebug \
              --no-daemon \
              --stacktrace
          fi

      - name: Locate and prepare APK
        shell: bash
        run: |
          set -euo pipefail

          APK_FILE=$(find "$PROJECT_DIR/app/build/outputs/apk" \
            -type f \
            -name "*.apk" \
            | head -n 1 || true)

          if [ -z "$APK_FILE" ]; then
            echo "ERROR: Build complete hua lekin APK file nahi mili."
            find "$PROJECT_DIR/app/build" -maxdepth 6 -type f || true
            exit 1
          fi

          mkdir -p "$GITHUB_WORKSPACE/output"

          cp "$APK_FILE" \
            "$GITHUB_WORKSPACE/output/Allrounder99-Cricket-v3.1.apk"

          sha256sum \
            "$GITHUB_WORKSPACE/output/Allrounder99-Cricket-v3.1.apk" \
            > "$GITHUB_WORKSPACE/output/Allrounder99-Cricket-v3.1.apk.sha256"

          echo "APK ready:"
          ls -lh "$GITHUB_WORKSPACE/output"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Allrounder99-Cricket-v3.1-APK
          path: output/*
          if-no-files-found: error
          retention-days: 14
