name: Build Allrounder99 APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Extract project
        run: |
          mkdir extracted
          unzip 0.zip -d extracted
          PROJECT_DIR=$(dirname "$(find extracted -name settings.gradle.kts | head -1)")
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Build APK
        env:
          CRICKET_API_KEY: ${{ secrets.CRICKET_API_KEY }}
        run: |
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Allrounder99-Cricket-APK
          path: extracted/**/app/build/outputs/apk/debug/*.apk
